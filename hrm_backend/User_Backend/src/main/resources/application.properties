# Application Configuration
spring.application.name=hrm
server.port=5002

# PostgreSQL Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/hrm_db_user
spring.datasource.username=postgres
spring.datasource.password=Rush@2001780

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Disable Hibernate automatic DDL to prevent creation of other tables
spring.jpa.hibernate.ddl-auto=none
# Ensure Spring runs the SQL initialization script to create only the users table
spring.sql.init.mode=always
spring.sql.init.platform=postgres
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000

# JWT Configuration
jwt.secret=your-very-secure-secret-key-change-this-in-production-at-least-256-bits-long
jwt.expiration=86400000